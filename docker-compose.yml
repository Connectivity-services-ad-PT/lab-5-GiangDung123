version: "3.8"

services:

  # ==========================
  # FastAPI API
  # ==========================
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fit4110-api-lab05

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy

    ports:
      - "${APP_PORT:-8000}:8000"

    networks:
      - team-internal

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


  # ==========================
  # PostgreSQL
  # ==========================
  db:
    image: postgres:15-alpine

    container_name: fit4110-db-lab05

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}

    volumes:
      - db-data:/var/lib/postgresql/data

    networks:
      - team-internal

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lab05} -d ${POSTGRES_DB:-iotdb}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5


  # ==========================
  # AI Service
  # ==========================
  ai-service:
    image: python:3.11-slim

    container_name: fit4110-ai-lab05

    restart: unless-stopped

    working_dir: /service

    volumes:
      - ./src/ai_service:/service

    command: >
      sh -c "
      pip install --no-cache-dir fastapi uvicorn pydantic &&
      uvicorn main:app --host 0.0.0.0 --port 9000
      "

    ports:
      - "9000:9000"

    networks:
      - team-internal

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health').read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s


networks:
  team-internal:
    driver: bridge


volumes:
  db-data: